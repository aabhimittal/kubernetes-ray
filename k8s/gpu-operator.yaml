# NVIDIA GPU Operator installation notes + namespace.
#
# The GPU Operator manages the NVIDIA driver, container toolkit, device plugin,
# DCGM exporter (for GPU metrics), and node feature discovery. Install it via
# Helm rather than raw manifests:
#
#   helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
#   helm repo update
#   helm install --wait --generate-name \
#     -n gpu-operator --create-namespace \
#     nvidia/gpu-operator
#
# This file just creates the training namespace and a ResourceQuota so a
# runaway job cannot exhaust the whole cluster's GPUs.
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-training
  labels:
    app: ray-gpu-training
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-quota
  namespace: gpu-training
spec:
  hard:
    requests.nvidia.com/gpu: "16"
    limits.nvidia.com/gpu: "16"
---
# Optional: a runtimeClass so pods explicitly request the NVIDIA runtime.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: nvidia
